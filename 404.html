<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var repoBase = '/pro-ai-test-2/';
        var path = window.location.pathname;
        var route = path.indexOf(repoBase) === 0 ? path.slice(repoBase.length) : path.replace(/^\/+/, '');
        var target = window.location.origin + repoBase + '#/' + route + window.location.search;

        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
